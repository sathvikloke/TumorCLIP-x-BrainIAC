# TumorCLIP baseline config — reproduces the published paper setup
# Swap `backbone.name` to repoint at a different image encoder in Phase 2.

experiment_name: tumorclip_baseline
seed: 42

data:
  root: data/processed
  image_size: 224
  batch_size: 32
  num_workers: 4

backbone:
  name: densenet121         # options: densenet121, resnet50, efficientnet_b0, ... (any timm model)
  pretrained: true          # use ImageNet weights
  freeze: false             # set true for linear probing
  feature_dim: 1024         # DenseNet121 produces 1024-d features after global pool

text_encoder:
  name: ViT-B-32            # open_clip model name
  pretrained: openai
  embed_dim: 512            # CLIP ViT-B/32 text embedding dimension

head:
  alpha: 0.3                # fusion weight from the paper
  learnable_alpha: false    # set true to learn it
  projection_hidden: 512    # MLP projection: feature_dim -> projection_hidden -> embed_dim

training:
  epochs: 100
  optimizer: adam
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  scheduler: cosine
  early_stopping_patience: 15
  label_smoothing: 0.0

logging:
  use_wandb: false
  wandb_project: tumorclip-repro
  log_interval: 10
  checkpoint_dir: checkpoints/
